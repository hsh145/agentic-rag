# LLaMA-Factory 微调配置 — 蒸馏判断模型
# 用法: llamafactory-cli train configs/lora_judge.yaml
# 推荐在 AutoDL RTX 4090 上运行（约 2-4 小时）

### 模型配置
model_name_or_path: Qwen/Qwen3-0.5B-Instruct
trust_remote_code: true

### 方法
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

### 数据配置
dataset: judge_data
dataset_dir: data/training
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4

### 训练参数
per_device_train_batch_size: 16
gradient_accumulation_steps: 2
learning_rate: 3.0e-5
num_train_epochs: 3.0
max_steps: -1
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 1800000

### 保存
output_dir: models/qwen-judge-lora
logging_steps: 10
save_steps: 200
save_total_limit: 3
plot_loss: true

### 评估
val_size: 0.05
per_device_eval_batch_size: 8
evaluation_strategy: steps
eval_steps: 200

### 其他
seed: 42
report_to: none
